# Jekyll Configuration for Veridot Documentation
title: Veridot
description: Enterprise-Grade Distributed Token Verification — Java library for zero-trust microservices
url: "https://cyfko.github.io"
baseurl: "/veridot"

# Repository information
repository: cyfko/veridot
github_username: cyfko

# Build settings
markdown: kramdown
highlighter: rouge
theme: just-the-docs
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-github-metadata

# just-the-docs theme settings
color_scheme: dark

# Navigation — only existing, up-to-date pages
header_pages:
  - index.md
  - docs/getting-started.md
  - docs/java-guide.md
  - docs/api-reference.md
  - docs/security.md
  - PROTOCOL_V2.md

# SEO and Social
author:
  name: Frank KOSSI
  email: frank.kossi@kunrin.com

social:
  name: Veridot
  links:
    - https://github.com/cyfko/veridot

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - java/
  - nodejs/
  - .gitignore
  - LICENSE
  - AUTHORS.md
  - CONTRIBUTING.md
  - CODE_OF_CONDUCT.md
  - PROTOCOL_V2.md

# Include additional files
include:
  - _pages
  - docs/adr

# Syntax highlighting
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# GitHub Pages specific settings
github: [metadata]